      let currentTab = "madu";

      let currentCategory = "all";
      let data = { madu: [], gugs: [] };
      let initialized = { madu: false, gugs: false };

      // ── Preço ──
      function formatPrice(raw) {
        if (!raw || !raw.trim()) return "";
        const val = raw.trim();
        const m = val.match(/^([\d.,]+)\s*[~\-]\s*([\d.,]+)$/);
        if (m) return `R$ ${m[1]} ~ R$ ${m[2]}`;
        if (/^[\d.,]+$/.test(val)) return `R$ ${val}`;
        if (val.toLowerCase().startsWith("r$")) return val;
        return val;
      }
      function normalizePrice(raw) {
        return raw
          ? raw
              .trim()
              .replace(/^R\$\s*/i, "")
              .trim()
          : "";
      }

      // ── Firebase ──
      function listenTab(tab) {
        onValue(ref(db, `wishlist/${tab}`), (snapshot) => {
          const val = snapshot.val();
          if (val === null && !initialized[tab]) {
            const initial = {};
            INITIAL_DATA[tab].forEach((item, i) => {
              initial[`item_${Date.now()}_${i}`] = {
                ...item,
                done: false,
                createdAt: Date.now() + i,
                order: i,
              };
            });
            set(ref(db, `wishlist/${tab}`), initial);
          }
          initialized[tab] = true;
          data[tab] = val
            ? Object.entries(val).map(([id, item]) => ({ id, ...item }))
            : [];
          data[tab].sort(
            (a, b) =>
              (a.order ?? a.createdAt ?? 0) - (b.order ?? b.createdAt ?? 0),
          );
          if (tab === currentTab) render();
        });
      }
      listenTab("madu");
      listenTab("gugs");

      // ── Toggle done ──
      window.toggleItem = function (id) {
        const item = data[currentTab].find((i) => i.id === id);
        if (!item) return;
        update(ref(db, `wishlist/${currentTab}/${id}`), { done: !item.done });
        showPulse();
      };

      // ── Delete — FIX: flag prevents closeModal from autosaving a deleted item ──
      let isDeleting = false;
      window.deleteItem = function (id) {
        const item = data[currentTab].find((i) => i.id === id);
        if (!item) return;
        if (!confirm(`Remover "${item.name}"?`)) return;
        isDeleting = true;
        editingId = null; // clear before closing
        _closeModalUI(); // close UI only, no save
        remove(ref(db, `wishlist/${currentTab}/${id}`)); // then delete
        isDeleting = false;
      };
      window.deleteFromModal = function () {
        if (editingId) deleteItem(editingId);
      };

      // ── Add ──
      window.addItem = function () {
        const nameEl = document.getElementById("new-name");
        const name = nameEl.value.trim();
        if (!name) {
          nameEl.focus();
          return;
        }
        const cat = document.getElementById("new-category").value;
        const id = `item_${Date.now()}`;
        const maxOrder = data[currentTab].reduce(
          (m, i) => Math.max(m, i.order ?? 0),
          0,
        );
        set(ref(db, `wishlist/${currentTab}/${id}`), {
          name,
          price: normalizePrice(document.getElementById("new-price").value),
          note: "",
          category: cat || "outro",
          desc: document.getElementById("new-desc").value.trim(),
          links: document.getElementById("new-links").value.trim(),
          done: false,
          createdAt: Date.now(),
          order: maxOrder + 1,
        });
        ["new-name", "new-price", "new-desc", "new-links"].forEach(
          (i) => (document.getElementById(i).value = ""),
        );
        document.getElementById("add-price-preview").textContent = "";
        document.getElementById("new-category").value = "";
        document.getElementById("add-panel").classList.add("hidden");
        nameEl.focus();
      };

      // ── Edit modal ──
      let editingId = null;
      let autosaveTimer = null;

      window.openEdit = function (id) {
        const item = data[currentTab].find((i) => i.id === id);
        if (!item) return;
        editingId = id;
        document.getElementById("edit-name").value = item.name || "";
        document.getElementById("edit-price").value = item.price || "";
        document.getElementById("edit-note").value = item.note || "";
        document.getElementById("edit-cat").value = item.category || "";
        document.getElementById("edit-desc").value = item.desc || "";
        document.getElementById("edit-links").value = item.links || "";
        document.getElementById("edit-price-preview").textContent = "";
        const btn = document.getElementById("save-edit-btn");
        if (btn)
          btn.style.background =
            currentTab === "madu"
              ? "linear-gradient(135deg,#e8a0a0,#c97070)"
              : "linear-gradient(135deg,#7aa8c7,#4a7da0)";
        const modal = document.getElementById("edit-modal");
        modal.classList.remove("hidden");
        setTimeout(
          () => modal.querySelector(".modal-box").classList.add("in"),
          10,
        );
        document.getElementById("edit-name").focus();
      };

      function persistEdit() {
        if (!editingId || isDeleting) return;
        const name = document.getElementById("edit-name").value.trim();
        if (!name) return;
        update(ref(db, `wishlist/${currentTab}/${editingId}`), {
          name,
          price: normalizePrice(document.getElementById("edit-price").value),
          note: document.getElementById("edit-note").value.trim(),
          category: document.getElementById("edit-cat").value || "outro",
          desc: document.getElementById("edit-desc").value.trim(),
          links: document.getElementById("edit-links").value.trim(),
        });
        showPulse();
        const badge = document.getElementById("autosave-badge");
        if (badge) {
          badge.classList.add("show");
          setTimeout(() => badge.classList.remove("show"), 1800);
        }
      }

      window.scheduleAutosave = function () {
        clearTimeout(autosaveTimer);
        autosaveTimer = setTimeout(persistEdit, 900);
      };

      window.saveEdit = function () {
        clearTimeout(autosaveTimer);
        persistEdit();
        closeModal();
      };

      // UI-only close (no save) — used internally by deleteItem
      function _closeModalUI() {
        clearTimeout(autosaveTimer);
        document.activeElement && document.activeElement.blur();
        const modal = document.getElementById("edit-modal");
        if (!modal) return;
        modal.querySelector(".modal-box").classList.remove("in");
        setTimeout(() => modal.classList.add("hidden"), 220);
      }

      window.closeModal = function () {
        clearTimeout(autosaveTimer);
        if (!isDeleting) persistEdit(); // autosave only if NOT deleting
        editingId = null;
        document.activeElement && document.activeElement.blur();
        const modal = document.getElementById("edit-modal");
        modal.querySelector(".modal-box").classList.remove("in");
        setTimeout(() => modal.classList.add("hidden"), 220);
      };

      // ── Tab / filter / category ──
      window.switchTab = function (tab) {
        currentTab = tab;
        currentFilter = "all";
        currentCategory = "all";
        document.getElementById("tab-madu").className =
          "tab-btn" + (tab === "madu" ? " active-madu" : "");
        document.getElementById("tab-gugs").className =
          "tab-btn" + (tab === "gugs" ? " active-gugs" : "");
        document.getElementById("add-panel").classList.add("hidden");
        setFilter("all", false);
        render();
      };

      window.setFilter = function (f, doRender = true) {
        currentFilter = f;
        ["all", "pending", "done"].forEach((x) => {
          document.getElementById("f-" + x).className =
            "filter-btn filter-" + currentTab + (x === f ? " active" : "");
        });
        if (doRender) render();
      };

      window.setCategoryFilter = function (cat) {
        currentCategory = cat;
        render();
      };

      window.toggleAddPanel = function () {
        const p = document.getElementById("add-panel");
        p.classList.toggle("hidden");
        if (!p.classList.contains("hidden")) {
          document.getElementById("add-confirm").className =
            "add-confirm" + (currentTab === "gugs" ? " gugs-btn" : "");
          document.getElementById("new-name").focus();

      window.previewPrice = function (inputId, previewId) {
        const formatted = formatPrice(
          normalizePrice(document.getElementById(inputId).value),
        );
        document.getElementById(previewId).textContent = formatted
          ? `→ ${formatted}`
          : "";
      };

      function showPulse() {
        const dot = document.getElementById("sync-dot");
        dot.classList.add("pulse");
        setTimeout(() => dot.classList.remove("pulse"), 800);
      }

      // ── Drag-to-reorder (mouse + touch) ──
      let dragSrc = null;
      let dragSrcId = null;
      let touchDragEl = null;
      let touchClone = null;
      let touchStartY2 = 0;

      window.onDragStart = function (e, id) {
        dragSrcId = id;
        dragSrc = e.currentTarget;
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => dragSrc && dragSrc.classList.add("dragging"), 0);
      };
      window.onDragEnd = function (e) {
        document
          .querySelectorAll(".wish-item")
          .forEach((el) => el.classList.remove("drag-over", "dragging"));
      };
      window.onDragOver = function (e) {
        e.preventDefault();
        e.currentTarget.classList.add("drag-over");
      };
      window.onDragLeave = function (e) {
        e.currentTarget.classList.remove("drag-over");
      };
      window.onDrop = function (e, targetId) {
        e.preventDefault();
        e.currentTarget.classList.remove("drag-over");
        if (!dragSrcId || dragSrcId === targetId) return;
        reorderItems(dragSrcId, targetId);
        dragSrcId = null;
      };

      function reorderItems(srcId, targetId) {
        const items = [...data[currentTab]];
        const srcIdx = items.findIndex((i) => i.id === srcId);
        const tgtIdx = items.findIndex((i) => i.id === targetId);
        if (srcIdx < 0 || tgtIdx < 0) return;
        const [moved] = items.splice(srcIdx, 1);
        items.splice(tgtIdx, 0, moved);
        // Write new order values to Firebase
        const updates = {};
        items.forEach((item, i) => {
          updates[`wishlist/${currentTab}/${item.id}/order`] = i;
        });
        update(ref(db), updates);
      }

      // Touch drag support
      window.onTouchDragStart = function (e, id) {
        if (e.touches.length !== 1) return;
        dragSrcId = id;
        touchStartY2 = e.touches[0].clientY;
        touchDragEl = e.currentTarget.closest("li");

        // Create visual clone
        touchClone = touchDragEl.cloneNode(true);
        touchClone.style.cssText = `position:fixed;left:${touchDragEl.getBoundingClientRect().left}px;top:${touchDragEl.getBoundingClientRect().top}px;width:${touchDragEl.offsetWidth}px;opacity:.85;pointer-events:none;z-index:999;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.18);transform:scale(1.02);transition:none;`;
        document.body.appendChild(touchClone);
        touchDragEl.style.opacity = "0.3";
      };

      document.addEventListener(
        "touchmove",
        (e) => {
          if (!touchClone || !dragSrcId) return;
          e.preventDefault();
          const t = e.touches[0];
          touchClone.style.top = t.clientY - 30 + "px";

          // Find element under touch
          touchClone.style.display = "none";
          const el = document.elementFromPoint(t.clientX, t.clientY);
          touchClone.style.display = "";
          const li = el && el.closest("li.wish-item");
          document
            .querySelectorAll(".wish-item")
            .forEach((x) => x.classList.remove("drag-over"));
          if (li && li !== touchDragEl) li.classList.add("drag-over");
        },
        { passive: false },
      );

      document.addEventListener(
        "touchend",
        (e) => {
          if (!touchClone || !dragSrcId) return;
          const t = e.changedTouches[0];
          touchClone.remove();
          touchClone = null;
          if (touchDragEl) {
            touchDragEl.style.opacity = "";
            touchDragEl = null;
          }

          touchClone = null;
          const el = document.elementFromPoint(t.clientX, t.clientY);
          const li = el && el.closest("li.wish-item");
          document
            .querySelectorAll(".wish-item")
            .forEach((x) => x.classList.remove("drag-over"));

          if (li) {
            const targetId = li.dataset.id;
            if (targetId && targetId !== dragSrcId)
              reorderItems(dragSrcId, targetId);
          }
          dragSrcId = null;
        },
        { passive: true },
      );

      // ── Render ──
      function render() {
        const items = data[currentTab] || [];
        const total = items.length;
        const done = items.filter((i) => i.done).length;
        document.getElementById("stat-done").textContent = done;
        document.getElementById("stat-total").textContent = total;
        const pct = total ? Math.round((done / total) * 100) : 0;
        document.getElementById("progress-fill").style.width = pct + "%";
        document.getElementById("progress-fill").className =
          "progress-fill fill-" + currentTab;
        document.getElementById("pct-label").textContent = pct + "%";
        document.getElementById("fab").className = "fab fab-" + currentTab;

        // Category pills
        renderCategoryPills(items);

        // Apply filters
        let filtered = items;
        if (currentFilter === "pending")
          filtered = filtered.filter((i) => !i.done);
        if (currentFilter === "done") filtered = filtered.filter((i) => i.done);
        if (currentCategory !== "all")
          filtered = filtered.filter((i) => i.category === currentCategory);

        const list = document.getElementById("wish-list");
        const emptyEl = document.getElementById("empty-state");
        if (filtered.length === 0) {
          list.innerHTML = "";
          emptyEl.classList.remove("hidden");
          return;
        }
        emptyEl.classList.add("hidden");

        list.innerHTML = filtered
          .map((item) => {
            const checkClass = item.done ? `checked-${currentTab}` : "";
            const priceFormatted = formatPrice(item.price || "");
            const priceTag = priceFormatted
              ? `<span class="item-price price-${currentTab}">${priceFormatted}</span>`
              : "";
            const noteTag = item.note
              ? `<span class="item-note">${item.note}</span>`
              : "";
            const cat = CATEGORIES.find((c) => c.id === item.category);
            const catTag = cat
              ? `<span class="item-cat">${cat.emoji} ${cat.label}</span>`
              : "";
            const descTag = item.desc
              ? `<div class="item-desc">${item.desc}</div>`
              : "";
            let linksHtml = "";
            if (item.links) {
              const ll = item.links
                .split(/[\n,]+/)
                .map((l) => l.trim())
                .filter(Boolean);
              linksHtml = `<div class="item-links">${ll
                .map((l, i) => {
                  const href = l.startsWith("http") ? l : "https://" + l;
                  return `<a href="${href}" target="_blank" rel="noopener" class="item-link link-${currentTab}">🔗 Link${ll.length > 1 ? " " + (i + 1) : ""}</a>`;
                })
                .join("")}</div>`;
            }
            return `<li class="wish-item${item.done ? " done" : ""}" id="li-${item.id}" data-id="${item.id}"
        draggable="true"
        ondragstart="onDragStart(event,'${item.id}')"
        ondragend="onDragEnd(event)"
        ondragover="onDragOver(event)"
        ondragleave="onDragLeave(event)"
        ondrop="onDrop(event,'${item.id}')">
        <div class="drag-grip" ontouchstart="onTouchDragStart(event,'${item.id}')" title="Arrastar">⠿</div>
        <div class="wish-check ${checkClass}" onclick="toggleItem('${item.id}')">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="item-body" onclick="openEdit('${item.id}')">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${priceTag}${noteTag}${catTag}</div>
          ${descTag}${linksHtml}
        </div>
        <button class="edit-btn" onclick="openEdit('${item.id}')" title="Editar">✏️</button>
      </li>`;
          })
          .join("");
      }

      function renderCategoryPills(items) {
        const usedCats = [
          ...new Set(items.map((i) => i.category).filter(Boolean)),
        ];
        const container = document.getElementById("cat-pills");
        if (!container) return;
        const accent = currentTab === "madu" ? "madu" : "gugs";
        container.innerHTML = `
      <button class="cat-pill ${currentCategory === "all" ? "active-" + accent : ""}" onclick="setCategoryFilter('all')">Todos</button>
      ${CATEGORIES.filter((c) => usedCats.includes(c.id))
        .map(
          (c) => `
        <button class="cat-pill ${currentCategory === c.id ? "active-" + accent : ""}" onclick="setCategoryFilter('${c.id}')">${c.emoji} ${c.label}</button>
      `,
        )
        .join("")}
    `;
      }

      window.addEventListener("DOMContentLoaded", () => {
        // Populate category selects
        const catOptions = CATEGORIES.map(
          (c) => `<option value="${c.id}">${c.emoji} ${c.label}</option>`,
        ).join("");
        document.getElementById("new-category").innerHTML =
          `<option value="">Categoria (opcional)</option>` + catOptions;
        document.getElementById("edit-cat").innerHTML =
          `<option value="">Sem categoria</option>` + catOptions;
        render();
      });

      window.addEventListener("click", (e) => {
        if (e.target.id === "edit-modal") closeModal();
      });

      document.addEventListener(
        "touchstart",
        (e) => {
          const tag = e.target.tagName;
          if (
            !["INPUT", "TEXTAREA", "BUTTON", "SELECT"].includes(tag) &&
            document.activeElement &&
            ["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)
          ) {
            document.activeElement.blur();
          }
        },
        { passive: true },
      );

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (
          e.key === "Enter" &&
          !document.getElementById("edit-modal").classList.contains("hidden") &&
          document.activeElement.tagName !== "TEXTAREA"
        )
          saveEdit();
      });

      let touchStartYModal = 0;
      document.addEventListener(
        "touchstart",
        (e) => {
          const box = document.querySelector(".modal-box");
          if (box && box.contains(e.target))
            touchStartYModal = e.touches[0].clientY;
        },
        { passive: true },
      );
      document.addEventListener(
        "touchend",
        (e) => {
          const box = document.querySelector(".modal-box");
          if (!box || !box.classList.contains("in")) return;
          if (e.changedTouches[0].clientY - touchStartYModal > 80) closeModal();
        },
        { passive: true },
      );
    </script>

    <style>

  <body>
    <div class="hero">
      <div class="sync-indicator">
        <div id="sync-dot"></div>
        ao vivo
      </div>
      <h1>Lista de <span>Desejos</span> ♡</h1>
      <p>Madu &amp; Gugs · 2026</p>
      <div class="tabs">
        <button
          class="tab-btn active-madu"
          id="tab-madu"
          onclick="switchTab('madu')"
        >
          🌸 Madu
        </button>
        <button class="tab-btn" id="tab-gugs" onclick="switchTab('gugs')">
          ⚡ Gugs
        </button>
      </div>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stats-left">
          <div class="stats-text">
            <strong id="stat-done">0</strong> de
            <strong id="stat-total">0</strong> realizados
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div
              class="progress-fill fill-madu"
              id="progress-fill"
              style="width: 0%"
            ></div>
          </div>
          <span id="pct-label">0%</span>
        </div>
      </div>

      <div class="filter-row">
        <button
          class="filter-btn filter-madu active"
          id="f-all"
          onclick="setFilter('all')"
        >
          Todos
        </button>
        <button
          class="filter-btn filter-madu"
          id="f-pending"
          onclick="setFilter('pending')"
        >
          Pendentes
        </button>
        <button
          class="filter-btn filter-madu"
          id="f-done"
          onclick="setFilter('done')"
        >
          ✓ Realizados
        </button>
      </div>

      <div class="cat-row" id="cat-pills"></div>

      <!-- ADD PANEL -->
      <div class="add-panel hidden" id="add-panel">
        <h3>✨ Novo desejo</h3>
        <div class="add-row">
          <input
            class="add-input"
            id="new-name"
            placeholder="Nome do item *"
            onkeydown="
              if (event.key === 'Enter')
                document.getElementById('new-price').focus();
            "
          />
        </div>
        <div class="add-row">
          <input
            class="add-input"
            id="new-price"
            placeholder="Preço — ex: 200 ou 100~400 (opcional)"
            oninput="previewPrice('new-price', 'add-price-preview')"
          />
        </div>
        <div class="price-preview" id="add-price-preview"></div>
        <div class="add-row">
          <select class="add-select add-input" id="new-category"></select>
        </div>
        <div class="add-row">
          <textarea
            class="add-input"
            id="new-desc"
            rows="2"
            placeholder="Descrição — cor, tamanho, modelo... (opcional)"
          ></textarea>
        </div>
        <div class="add-row">
          <input
            class="add-input"
            id="new-links"
            placeholder="Links de referência — separados por vírgula (opcional)"
            onkeydown="if (event.key === 'Enter') addItem();"
          />
          <button class="add-confirm" id="add-confirm" onclick="addItem()">
            Adicionar
          </button>
        </div>
      </div>

      <ul class="wish-list" id="wish-list"></ul>
      <div class="empty hidden" id="empty-state">
        <span class="emoji">🌟</span>Nenhum item aqui!
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay hidden" id="edit-modal">
      <div class="modal-box">
        <div class="drag-handle"></div>
        <div class="modal-header">
          <span class="modal-title"
            >Editar ✏️
            <span class="autosave-badge" id="autosave-badge"
              >✓ salvo</span
            ></span
          >
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-field">
          <div class="modal-label">Nome *</div>
          <input
            class="modal-input"
            id="edit-name"
            placeholder="Nome do item"
            oninput="scheduleAutosave()"
          />
        </div>
        <div class="modal-field">
          <div class="modal-label">Preço</div>
          <input
            class="modal-input"
            id="edit-price"
            placeholder="Ex: 200 ou 100~400"
            oninput="
              previewPrice('edit-price', 'edit-price-preview');
              scheduleAutosave();
            "
          />
          <div class="modal-price-preview" id="edit-price-preview"></div>
        </div>
        <div class="modal-field">
          <div class="modal-label">Categoria</div>
          <select
            class="modal-select"
            id="edit-cat"
            onchange="scheduleAutosave()"
          ></select>
        </div>
        <div class="modal-field">
          <div class="modal-label">Observação rápida</div>
          <input
            class="modal-input"
            id="edit-note"
            placeholder="Ex: escolha própria, tamanho M..."
            oninput="scheduleAutosave()"
          />
        </div>
        <div class="modal-field">
          <div class="modal-label">Descrição</div>
          <textarea
            class="modal-input"
            id="edit-desc"
            rows="3"
            placeholder="Detalhes, modelo, cor, tamanho..."
            oninput="scheduleAutosave()"
          ></textarea>
        </div>
        <div class="modal-field">
          <div class="modal-label">Links de referência</div>
          <textarea
            class="modal-input"
            id="edit-links"
            rows="2"
            placeholder="Cole links separados por vírgula ou por linha"
            oninput="scheduleAutosave()"
          ></textarea>
        </div>
        <div class="modal-actions">
          <button class="del-modal-btn" onclick="deleteFromModal()">
            🗑 Remover
          </button>
          <button class="close-btn" id="save-edit-btn" onclick="saveEdit()">
            Concluir
          </button>
        </div>
      </div>
    </div>

    <button
      class="fab fab-madu"
      id="fab"
      onclick="toggleAddPanel()"
      title="Adicionar desejo"
    >
      +
    </button>
  </body>
</html>
