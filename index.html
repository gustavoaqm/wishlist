      // ─── Price helpers ───
      function priceToNumber(raw) {
        if (!raw) return -1;
        const m = raw.match(/^([\d.,]+)\s*[~\-]\s*([\d.,]+)$/);
        if (m)
          return (
            (parseFloat(m[1].replace(",", ".")) +
              parseFloat(m[2].replace(",", "."))) /
            2
          );
        const n = parseFloat(raw.replace(",", "."));
        return isNaN(n) ? -1 : n;
      }
      function formatPrice(raw) {
        if (!raw || !raw.trim()) return "";
        const val = raw.trim();
        const m = val.match(/^([\d.,]+)\s*[~\-]\s*([\d.,]+)$/);
        if (m) return `R$ ${m[1]} ~ R$ ${m[2]}`;
        if (/^[\d.,]+$/.test(val)) return `R$ ${val}`;
        if (val.toLowerCase().startsWith("r$")) return val;
        return val;
      }
      function normalizePrice(raw) {
        return raw
          ? raw
              .trim()
              .replace(/^R\$\s*/i, "")
              .trim()
          : "";
      }

      // ─── Firebase ───
      function listenTab(tab) {
        onValue(ref(db, `wishlist/${tab}`), (snapshot) => {
          const val = snapshot.val();
          if (val === null && !initialized[tab]) {
            const init = {};
            INITIAL_DATA[tab].forEach((item, i) => {
              init[`item_${Date.now()}_${i}`] = {
                ...item,
                done: false,
                createdAt: Date.now() + i,
                order: i,
              };
            });
            set(ref(db, `wishlist/${tab}`), init);
          }
          initialized[tab] = true;
          data[tab] = val
            ? Object.entries(val).map(([id, item]) => ({ id, ...item }))
            : [];
          data[tab].sort(
            (a, b) =>
              (a.order ?? a.createdAt ?? 0) - (b.order ?? b.createdAt ?? 0),
          );
          if (tab === currentTab) render();
        });
      }

      // ─── Drag-to-reorder (desktop: HTML5 native, smooth with placeholder) ───
      let dragSrcId = null;
      let placeholder = null;

      function createPlaceholder(refEl) {
        const ph = document.createElement("li");
        ph.className = "drag-placeholder";
        ph.style.height = refEl.offsetHeight + "px";
        return ph;
      }

      window.onDragStart = function (e, id) {
        dragSrcId = id;
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", id);
        const li = e.currentTarget;
        // Use a drag image that matches the element
        e.dataTransfer.setDragImage(li, 20, 20);
        setTimeout(() => {
          li.classList.add("dragging");
          placeholder = createPlaceholder(li);
          li.after(placeholder);
        }, 0);
      };

      window.onDragEnd = function (e) {
        const li = e.currentTarget;
        li.classList.remove("dragging");
        placeholder?.remove();
        placeholder = null;
        document
          .querySelectorAll(".wish-item")
          .forEach((el) => el.classList.remove("drag-over"));
        dragSrcId = null;
      };

      window.onDragOver = function (e, id) {
        e.preventDefault();
        if (!dragSrcId || id === dragSrcId) return;
        // Move placeholder to show where item will land
        const li = e.currentTarget;
        const rect = li.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (placeholder) {
          if (e.clientY < midY) li.before(placeholder);
          else li.after(placeholder);
        }
        document
          .querySelectorAll(".wish-item")
          .forEach((el) => el.classList.remove("drag-over"));
        li.classList.add("drag-over");
      };

      window.onDragLeave = function (e) {
        e.currentTarget.classList.remove("drag-over");
      };

      window.onDrop = function (e, targetId) {
        e.preventDefault();
        document
          .querySelectorAll(".wish-item")
          .forEach((el) => el.classList.remove("drag-over"));
        if (!dragSrcId || dragSrcId === targetId) return;
        const li = e.currentTarget;
        const rect = li.getBoundingClientRect();
        const after = e.clientY > rect.top + rect.height / 2;
        reorderItems(dragSrcId, targetId, after);
      };

      function reorderItems(srcId, targetId, insertAfter = false) {
        const items = [...data[currentTab]];
        const srcIdx = items.findIndex((i) => i.id === srcId);
        const tgtIdx = items.findIndex((i) => i.id === targetId);
        if (srcIdx < 0 || tgtIdx < 0) return;
        const [moved] = items.splice(srcIdx, 1);
        const newTgt = items.findIndex((i) => i.id === targetId);
        items.splice(insertAfter ? newTgt + 1 : newTgt, 0, moved);
        const updates = {};
        items.forEach((item, i) => {
          updates[`wishlist/${currentTab}/${item.id}/order`] = i;
        });
        update(ref(db), updates);
        currentSort = "manual";
        try {
          localStorage.setItem(`sort-${currentTab}`, "manual");
        } catch (e) {}
        document.getElementById("sort-btn-label").textContent = "↕ Ordenar";
      }

      // ─── Touch drag (mobile) — smooth floating card ───
      let touchDragId = null;
      let touchDragLi = null;
      let touchFloat = null;
      let touchOffsetY = 0;

      window.onGripTouchStart = function (e, id) {
        if (e.touches.length !== 1) return;
        e.stopPropagation();
        touchDragId = id;
        touchDragLi = e.currentTarget.closest("li");
        const touch = e.touches[0];
        const rect = touchDragLi.getBoundingClientRect();
        touchOffsetY = touch.clientY - rect.top;

        // Build floating clone
        touchFloat = touchDragLi.cloneNode(true);
        Object.assign(touchFloat.style, {
          position: "fixed",
          left: rect.left + "px",
          top: rect.top + "px",
          width: rect.width + "px",
          margin: "0",
          zIndex: "999",
          pointerEvents: "none",
          borderRadius: "12px",
          boxShadow: "0 12px 32px rgba(0,0,0,.22)",
          opacity: ".92",
          transition: "none",
          transform: "scale(1.02)",
        });
        document.body.appendChild(touchFloat);
        touchDragLi.style.opacity = "0.2";

        placeholder = createPlaceholder(touchDragLi);
        touchDragLi.after(placeholder);
      };

      document.addEventListener(
        "touchmove",
        (e) => {
          if (!touchFloat || !touchDragId) return;
          e.preventDefault();
          const touch = e.touches[0];
          touchFloat.style.top = touch.clientY - touchOffsetY + "px";

          // Hit-test for target list item
          touchFloat.style.visibility = "hidden";
          const el = document.elementFromPoint(touch.clientX, touch.clientY);
          touchFloat.style.visibility = "";
          const li = el?.closest("li.wish-item");
          if (li && li !== touchDragLi) {
            const rect = li.getBoundingClientRect();
            if (touch.clientY < rect.top + rect.height / 2)
              li.before(placeholder);
            else li.after(placeholder);
          }
        },
        { passive: false },
      );

      document.addEventListener(
        "touchend",
        (e) => {
          if (!touchFloat || !touchDragId) return;
          touchFloat.remove();
          touchFloat = null;
          touchDragLi.style.opacity = "";

          // Find where placeholder ended up and reorder accordingly
          if (placeholder && placeholder.parentNode) {
            const siblings = [...placeholder.parentNode.children];
            const phIdx = siblings.indexOf(placeholder);
            // Build new ordered id list from DOM (excluding placeholder and dragged item)
            const listEl = document.getElementById("wish-list");
            const lis = [...listEl.querySelectorAll("li.wish-item")];
            const ordered = [];
            siblings.forEach((el) => {
              if (el === placeholder) {
                ordered.push(touchDragId);
                return;
              }
              if (el.dataset?.id && el.dataset.id !== touchDragId)
                ordered.push(el.dataset.id);
            });
            // Write order
            const updates = {};
            ordered.forEach((id, i) => {
              updates[`wishlist/${currentTab}/${id}/order`] = i;
            });
            if (Object.keys(updates).length) {
              update(ref(db), updates);
              currentSort = "manual";
              try {
                localStorage.setItem(`sort-${currentTab}`, "manual");
              } catch (e) {}
              document.getElementById("sort-btn-label").textContent =
                "↕ Ordenar";
            }
          }
          placeholder?.remove();
          placeholder = null;
          touchDragLi = null;
          touchDragId = null;
        },
        { passive: true },
      );

      // ─── Render ───
      function applySort(items) {
        const copy = [...items];
        if (currentSort === "name-az")
          return copy.sort((a, b) => a.name.localeCompare(b.name, "pt"));
        if (currentSort === "name-za")
          return copy.sort((a, b) => b.name.localeCompare(a.name, "pt"));
        if (currentSort === "price-asc")
          return copy.sort(
            (a, b) => priceToNumber(a.price) - priceToNumber(b.price),
          );
        if (currentSort === "price-desc")
          return copy.sort(
            (a, b) => priceToNumber(b.price) - priceToNumber(a.price),
          );
        return copy; // 'manual' — already sorted by .order in listenTab
      }

      function render() {
        const items = data[currentTab] || [];
        const total = items.length;
        const done = items.filter((i) => i.done).length;
        document.getElementById("stat-done").textContent = done;
        document.getElementById("stat-total").textContent = total;
        const pct = total ? Math.round((done / total) * 100) : 0;
        document.getElementById("progress-fill").style.width = pct + "%";
        document.getElementById("progress-fill").className =
          "progress-fill fill-" + currentTab;
        document.getElementById("pct-label").textContent = pct + "%";
        document.getElementById("fab").className = "fab fab-" + currentTab;

        // Category pills (collapsible)
        renderCategoryPills(items);

        // Filter
        let filtered = items;
        if (currentFilter === "pending")
          filtered = filtered.filter((i) => !i.done);
        if (currentFilter === "done") filtered = filtered.filter((i) => i.done);
        if (currentCategory !== "all")
          filtered = filtered.filter((i) => i.category === currentCategory);

        // Sort
        filtered = applySort(filtered);

        const list = document.getElementById("wish-list");
        const emptyEl = document.getElementById("empty-state");
        if (!filtered.length) {
          list.innerHTML = "";
          emptyEl.classList.remove("hidden");
          return;
        }
        emptyEl.classList.add("hidden");

        const isDraggable = currentSort === "manual";

        list.innerHTML = filtered
          .map((item) => {
            const checkClass = item.done ? `checked-${currentTab}` : "";
            const priceFormatted = formatPrice(item.price || "");
            const priceTag = priceFormatted
              ? `<span class="item-price price-${currentTab}">${priceFormatted}</span>`
              : "";
            const noteTag = item.note
              ? `<span class="item-note">${item.note}</span>`
              : "";
            const cat = CATEGORIES.find((c) => c.id === item.category);
            const catTag = cat
              ? `<span class="item-cat">${cat.emoji} ${cat.label}</span>`
              : "";
            const descTag = item.desc
              ? `<div class="item-desc">${item.desc}</div>`
              : "";
            let linksHtml = "";
            if (item.links) {
              const ll = item.links
                .split(/[\n,]+/)
                .map((l) => l.trim())
                .filter(Boolean);
              linksHtml = `<div class="item-links">${ll
                .map((l, i) => {
                  const href = l.startsWith("http") ? l : "https://" + l;
                  return `<a href="${href}" target="_blank" rel="noopener" class="item-link link-${currentTab}">🔗 Link${ll.length > 1 ? " " + (i + 1) : ""}</a>`;
                })
                .join("")}</div>`;
            }
            const gripHtml = isDraggable
              ? `<div class="drag-grip" ontouchstart="onGripTouchStart(event,'${item.id}')" title="Arrastar para reordenar">⠿</div>`
              : `<div class="drag-grip drag-grip-hidden">⠿</div>`;

            return `<li class="wish-item${item.done ? " done" : ""}" data-id="${item.id}"
          ${
            isDraggable
              ? `draggable="true"
          ondragstart="onDragStart(event,'${item.id}')"
          ondragend="onDragEnd(event)"
          ondragover="onDragOver(event,'${item.id}')"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event,'${item.id}')"`
              : ""
          }>
        ${gripHtml}
        <div class="wish-check ${checkClass}" onclick="toggleItem('${item.id}')">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="item-body" onclick="openEdit('${item.id}')">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${priceTag}${noteTag}${catTag}</div>
          ${descTag}${linksHtml}
        </div>
        <button class="edit-btn" onclick="openEdit('${item.id}')" title="Editar">✏️</button>
      </li>`;
          })
          .join("");
      }

      function renderCategoryPills(items) {
        const usedCats = [
          ...new Set(items.map((i) => i.category).filter(Boolean)),
        ];
        const container = document.getElementById("cat-pills");
        if (!container || !usedCats.length) {
          if (container) container.innerHTML = "";
          return;
        }

        const accent = currentTab === "madu" ? "madu" : "gugs";
        const maxShow = 3;
        const cats = CATEGORIES.filter((c) => usedCats.includes(c.id));
        const visible = catExpanded ? cats : cats.slice(0, maxShow);
        const hasMore = cats.length > maxShow;

        container.innerHTML = `
      <button class="cat-pill ${currentCategory === "all" ? "active-" + accent : ""}" onclick="setCategoryFilter('all')">Todos</button>
      ${visible
        .map(
          (c) => `
        <button class="cat-pill ${currentCategory === c.id ? "active-" + accent : ""}" onclick="setCategoryFilter('${c.id}')">${c.emoji} ${c.label}</button>
      `,
        )
        .join("")}
      ${hasMore ? `<button class="cat-pill cat-more" onclick="toggleCatExpanded()">${catExpanded ? "− Menos" : "+ " + (cats.length - maxShow)}</button>` : ""}
    `;
      }

      window.addEventListener("DOMContentLoaded", () => {
        const catOptions = CATEGORIES.map(
          (c) => `<option value="${c.id}">${c.emoji} ${c.label}</option>`,
        ).join("");
        document.getElementById("new-category").innerHTML =
          `<option value="">Categoria (opcional)</option>` + catOptions;
        document.getElementById("edit-cat").innerHTML =
          `<option value="">Sem categoria</option>` + catOptions;

        // Restore sort preference
        try {
          const saved = localStorage.getItem(`sort-${currentTab}`);
          if (saved) {
            currentSort = saved;
            const labels = {
              manual: "↕ Ordenar",
              "name-az": "A → Z",
              "name-za": "Z → A",
              "price-asc": "R$ ↑",
              "price-desc": "R$ ↓",
            };
            document.getElementById("sort-btn-label").textContent =
              labels[saved] || "↕ Ordenar";
          }
        } catch (e) {}

        render();

        // Close sort dropdown when clicking outside
        document.addEventListener("click", (e) => {
          const dd = document.getElementById("sort-dropdown");
          if (
            !dd.classList.contains("hidden") &&
            !e.target.closest(".sort-wrap")
          )
            dd.classList.add("hidden");
        });
      });

      window.addEventListener("click", (e) => {
        if (e.target.id === "edit-modal") closeModal();
      });

      document.addEventListener(
        "touchstart",
        (e) => {
          const tag = e.target.tagName;
          if (
            !["INPUT", "TEXTAREA", "BUTTON", "SELECT"].includes(tag) &&
            document.activeElement &&
            ["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)
          )
            document.activeElement.blur();
        },
        { passive: true },
      );

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (
          e.key === "Enter" &&
          !document.getElementById("edit-modal").classList.contains("hidden") &&
          document.activeElement.tagName !== "TEXTAREA"
        )
          saveEdit();
      });

      let touchStartYModal = 0;
      document.addEventListener(
        "touchstart",
        (e) => {
          const box = document.querySelector(".modal-box");
          if (box?.contains(e.target)) touchStartYModal = e.touches[0].clientY;
        },
        { passive: true },
      );
      document.addEventListener(
        "touchend",
        (e) => {
          const box = document.querySelector(".modal-box");
          if (!box?.classList.contains("in")) return;
          if (e.changedTouches[0].clientY - touchStartYModal > 80) closeModal();
        },
        { passive: true },
      );
    </script>

        font-size: 12px;
        color: var(--muted);
        font-style: italic;
      }
      .item-cat {
        font-size: 11px;
        color: var(--muted);
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 1px 7px;
        border-radius: 20px;
      }
      .item-desc {
        font-size: 12px;
        color: #6a5c5c;
        margin-top: 5px;
        line-height: 1.5;
      }
      .item-links {
        margin-top: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .item-link {
        font-size: 11px;
        font-weight: 500;
        padding: 3px 10px;
        border-radius: 20px;
        text-decoration: none;
      }
      .item-link:hover {
        opacity: 0.75;
      }
      .link-madu {
        background: #fae8e8;
        color: var(--rose-dark);
      }
      .link-gugs {
        background: #e4eef5;
        color: var(--blue-dark);
      }

      .edit-btn {
        background: none;
        border: none;
        font-size: 15px;
        cursor: pointer;
        color: #ccc;
        padding: 3px 6px;
        border-radius: 6px;
        flex-shrink: 0;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .wish-item:hover .edit-btn {
        opacity: 1;
      }

      /* FAB */
      .fab {
        position: fixed;
        bottom: 24px;
        right: 20px;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: none;
        font-size: 26px;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
        transition: transform 0.15s;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .fab:active {
        transform: scale(0.9);
      }
      .fab-madu {
        background: linear-gradient(135deg, var(--rose), var(--rose-dark));
        color: white;
      }
      .fab-gugs {
        background: linear-gradient(135deg, var(--blue), var(--blue-dark));
        color: white;
      }

      /* EMPTY */
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
        font-size: 14px;
      }
      .empty .emoji {
        font-size: 36px;
        display: block;
        margin-bottom: 10px;
      }

      /* MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(30, 10, 10, 0.4);
        backdrop-filter: blur(4px);
        z-index: 200;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      @media (min-width: 500px) {
        .modal-overlay {
          align-items: center;
          padding: 20px;
        }
      }
      .modal-box {
        background: var(--card);
        border-radius: 20px 20px 0 0;
        width: 100%;
        max-width: 520px;
        padding: 8px 20px 36px;
        transform: translateY(40px);
        opacity: 0;
        transition:
          transform 0.22s ease,
          opacity 0.22s ease;
        max-height: 92vh;
        overflow-y: auto;
      }
      @media (min-width: 500px) {
        .modal-box {
          border-radius: 20px;
          padding-top: 24px;
        }
      }
      .modal-box.in {
        transform: translateY(0);
        opacity: 1;
      }
      .drag-handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 4px;
        margin: 8px auto 16px;
      }
      @media (min-width: 500px) {
        .drag-handle {
          display: none;
        }
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .modal-title {
        font-family: "Playfair Display", serif;
        font-size: 18px;
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: var(--muted);
        padding: 4px 8px;
        border-radius: 8px;
      }
      .modal-close:hover {
        background: var(--border);
      }
      .modal-field {
        margin-bottom: 12px;
      }
      .modal-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-bottom: 5px;
      }
      .modal-input {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 16px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border 0.2s;
        resize: vertical;
        -webkit-text-size-adjust: 100%;
      }
      .modal-input:focus {
        border-color: var(--rose-dark);
      }
      .modal-select {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        appearance: none;
        cursor: pointer;
      }
      .modal-select:focus {
        border-color: var(--rose-dark);
      }
      .modal-price-preview {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
        min-height: 14px;
        font-style: italic;
      }
      .autosave-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: #6dba8a;
        opacity: 0;
        transition: opacity 0.3s;
        margin-left: 8px;
      }
      .autosave-badge.show {
        opacity: 1;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
      }
      .close-btn {
        flex: 1;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        color: white;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .close-btn:active {
        transform: scale(0.97);
      }
      .del-modal-btn {
        padding: 14px 16px;
        border: 1.5px solid #fae8e8;
        border-radius: 12px;
        background: white;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        cursor: pointer;
        color: var(--rose-dark);
        transition: background 0.2s;
      }
      .del-modal-btn:hover {
        background: #fae8e8;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="sync-indicator">
        <div id="sync-dot"></div>
        ao vivo
      </div>
      <h1>Lista de <span>Desejos</span> ♡</h1>
      <p>Madu &amp; Gugs · 2026</p>
      <div class="tabs">
        <button
          class="tab-btn active-madu"
          id="tab-madu"
          onclick="switchTab('madu')"
        >
          🌸 Madu
        </button>
        <button class="tab-btn" id="tab-gugs" onclick="switchTab('gugs')">
          ⚡ Gugs
        </button>
      </div>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stats-left">
          <div class="stats-text">
            <strong id="stat-done">0</strong> de
            <strong id="stat-total">0</strong> realizados
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div
              class="progress-fill fill-madu"
              id="progress-fill"
              style="width: 0%"
            ></div>
          </div>
          <span id="pct-label">0%</span>
        </div>
      </div>

      <!-- TOOLBAR: status filters + sort -->
      <div class="toolbar">
        <div class="filter-group">
          <button
            class="filter-btn filter-madu active"
            id="f-all"
            onclick="setFilter('all')"
          >
            Todos
          </button>
          <button
            class="filter-btn filter-madu"
            id="f-pending"
            onclick="setFilter('pending')"
          >
            Pendentes
          </button>
          <button
            class="filter-btn filter-madu"
            id="f-done"
            onclick="setFilter('done')"
          >
            ✓ Feitos
          </button>
        </div>
        <div class="sort-wrap">
          <button class="sort-btn" onclick="toggleSortDropdown()">
            <span id="sort-btn-label">↕ Ordenar</span> ▾
          </button>
          <div class="sort-dropdown hidden" id="sort-dropdown">
            <div class="sort-divider">Posição</div>
            <button class="sort-option" onclick="setSort('manual')">
              ⠿ Manual (arrastar)
            </button>
            <div class="sort-divider">Nome</div>
            <button class="sort-option" onclick="setSort('name-az')">
              A → Z
            </button>
            <button class="sort-option" onclick="setSort('name-za')">
              Z → A
            </button>
            <div class="sort-divider">Preço</div>
            <button class="sort-option" onclick="setSort('price-desc')">
              Maior primeiro
            </button>
            <button class="sort-option" onclick="setSort('price-asc')">
              Menor primeiro
            </button>
          </div>
        </div>
      </div>

      <!-- CATEGORY PILLS (collapsible) -->
      <div class="cat-row" id="cat-pills"></div>

      <!-- ADD PANEL -->
      <div class="add-panel hidden" id="add-panel">
        <h3>✨ Novo desejo</h3>
        <div class="add-row">
          <input
            class="add-input"
            id="new-name"
            placeholder="Nome do item *"
            onkeydown="
              if (event.key === 'Enter')
                document.getElementById('new-price').focus();
            "
          />
        </div>
        <div class="add-row">
          <input
            class="add-input"
            id="new-price"
            placeholder="Preço — ex: 200 ou 100~400 (opcional)"
            oninput="previewPrice('new-price', 'add-price-preview')"
          />
        </div>
        <div class="price-preview" id="add-price-preview"></div>
        <div class="add-row">
          <select class="add-select add-input" id="new-category"></select>
        </div>
        <div class="add-row">
          <textarea
            class="add-input"
            id="new-desc"
            rows="2"
            placeholder="Descrição — cor, tamanho, modelo... (opcional)"
          ></textarea>
        </div>
        <div class="add-row">
          <input
            class="add-input"
            id="new-links"
            placeholder="Links de referência — separados por vírgula (opcional)"
            onkeydown="if (event.key === 'Enter') addItem();"
          />
          <button class="add-confirm" id="add-confirm" onclick="addItem()">
            Adicionar
          </button>
        </div>
      </div>

      <ul class="wish-list" id="wish-list"></ul>
      <div class="empty hidden" id="empty-state">
        <span class="emoji">🌟</span>Nenhum item aqui!
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay hidden" id="edit-modal">
      <div class="modal-box">
        <div class="drag-handle"></div>
        <div class="modal-header">
          <span class="modal-title"
            >Editar ✏️
            <span class="autosave-badge" id="autosave-badge"
              >✓ salvo</span
            ></span
          >
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-field">
          <div class="modal-label">Nome *</div>
          <input
            class="modal-input"
            id="edit-name"
            placeholder="Nome do item"
            oninput="scheduleAutosave()"
          />
        </div>
        <div class="modal-field">
          <div class="modal-label">Preço</div>
          <input
            class="modal-input"
            id="edit-price"
            placeholder="Ex: 200 ou 100~400"
            oninput="
              previewPrice('edit-price', 'edit-price-preview');
              scheduleAutosave();
            "
          />
          <div class="modal-price-preview" id="edit-price-preview"></div>
        </div>
        <div class="modal-field">
          <div class="modal-label">Categoria</div>
          <select
            class="modal-select"
            id="edit-cat"
            onchange="scheduleAutosave()"
          ></select>
        </div>
        <div class="modal-field">
          <div class="modal-label">Observação rápida</div>
          <input
            class="modal-input"
            id="edit-note"
            placeholder="Ex: escolha própria, tamanho M..."
            oninput="scheduleAutosave()"
          />
        </div>
        <div class="modal-field">
          <div class="modal-label">Descrição</div>
          <textarea
            class="modal-input"
            id="edit-desc"
            rows="3"
            placeholder="Detalhes, modelo, cor, tamanho..."
            oninput="scheduleAutosave()"
          ></textarea>
        </div>
        <div class="modal-field">
          <div class="modal-label">Links de referência</div>
          <textarea
            class="modal-input"
            id="edit-links"
            rows="2"
            placeholder="Cole links separados por vírgula ou por linha"
            oninput="scheduleAutosave()"
          ></textarea>
        </div>
        <div class="modal-actions">
          <button class="del-modal-btn" onclick="deleteFromModal()">
            🗑 Remover
          </button>
          <button class="close-btn" id="save-edit-btn" onclick="saveEdit()">
            Concluir
          </button>
        </div>
      </div>
    </div>

    <button
      class="fab fab-madu"
      id="fab"
      onclick="toggleAddPanel()"
      title="Adicionar desejo"
    >
      +
    </button>
  </body>
</html>
