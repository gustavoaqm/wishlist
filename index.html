<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Desejos 💝 Madu & Gugs</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ─────────────────────────────────────────────
  // 🔥 COLE AQUI SUA CONFIG DO FIREBASE
  // (veja o README.md para instruções)
  // ─────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "COLE_AQUI",
    authDomain: "COLE_AQUI",
    databaseURL: "COLE_AQUI",
    projectId: "COLE_AQUI",
    storageBucket: "COLE_AQUI",
    messagingSenderId: "COLE_AQUI",
    appId: "COLE_AQUI"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ─── Estado local ───
  let currentTab = 'madu';
  let currentFilter = 'all';
  let data = { madu: [], gugs: [] };
  let initialized = { madu: false, gugs: false };

  // Dados iniciais (só usados na primeira vez, se o Firebase estiver vazio)
  const INITIAL_DATA = {
    madu: [
      { name: "Anel solitário prata 950", price: "R$ 100~300", note: "Escolha própria" },
      { name: "Kit colar e brinco de prata", price: "R$ 150~200", note: "Escolha própria" },
      { name: "Tênis Branco Nike", price: "R$ 350", note: "" },
      { name: "Câmera Wi-Fi", price: "R$ 200", note: "" },
      { name: "Jaqueta Puffer Branca/OffWhite", price: "R$ 200", note: "Estilo consultado" },
      { name: "Bota cano alto", price: "R$ 300", note: "" },
      { name: "Vibrador", price: "R$ 100~400", note: "Várias opções" },
      { name: "Algema", price: "R$ 50", note: "" },
      { name: "Lingerie", price: "R$ 100", note: "😏" },
      { name: "Meias Lupo", price: "R$ 40", note: "" },
      { name: "Chinelo adidas/nike", price: "R$ 150~200", note: "Nike Preto, Nike Branco ou Adidas Rosa" },
      { name: "Roupas YouCom (Blusa, Vestido, Shorts, Calças)", price: "Variável", note: "" },
      { name: "Camiseta adidas/nike", price: "Variável", note: "" },
      { name: "Shorts Esportivo Nike", price: "R$ 240", note: "" },
      { name: "iPad / Tablet Samsung", price: "R$ 2.800", note: "Samsung ou iPad" },
      { name: "Teclado e caneta Tablet", price: "", note: "Se for iPad" },
      { name: "Macbook Fino", price: "R$ 7.500", note: "" },
      { name: "Fone Original Apple (ou outro bom)", price: "R$ 1.500", note: "" },
    ],
    gugs: [
      { name: "Armário", price: "", note: "" },
      { name: "Perfume Armani", price: "", note: "" },
      { name: "Colônia", price: "", note: "" },
      { name: "Calça moletom Nike/adidas", price: "", note: "" },
      { name: "Nerf", price: "", note: "" },
      { name: "Pista Hot Wheels", price: "", note: "" },
      { name: "Skate de Dedo", price: "", note: "" },
      { name: "Beyblade", price: "", note: "" },
      { name: "Tablet para estudo", price: "", note: "" },
      { name: "Bermuda moletom Nike/adidas", price: "", note: "" },
      { name: "PS5 (GTA6)", price: "", note: "" },
      { name: "iPhone 16e", price: "", note: "" },
      { name: "Escapamento JK", price: "", note: "" },
      { name: "Insulfilm na Frente", price: "", note: "" },
      { name: "Polimento do Carro", price: "", note: "" },
      { name: "Limpeza Profunda Carro", price: "", note: "" },
      { name: "Óculos de VR PC", price: "", note: "" },
      { name: "Led nos faróis", price: "", note: "" },
      { name: "Câmeras WiFi", price: "", note: "" },
      { name: "Ar condicionado", price: "", note: "" },
      { name: "Camiseta de botão", price: "", note: "" },
      { name: "Suéter de Tiozinho", price: "", note: "😂" },
      { name: "Camiseta Furia Original", price: "", note: "" },
      { name: "Juliet", price: "", note: "" },
      { name: "Óculos de Sol", price: "", note: "" },
      { name: "Lego", price: "", note: "" },
      { name: "Fone Bluetooth", price: "", note: "" },
    ]
  };

  // ─── Firebase listeners ───
  function listenTab(tab) {
    const dbRef = ref(db, `wishlist/${tab}`);
    onValue(dbRef, (snapshot) => {
      const val = snapshot.val();
      if (val === null && !initialized[tab]) {
        // Primeira vez: popula com dados iniciais
        const initial = {};
        INITIAL_DATA[tab].forEach((item, i) => {
          initial[`item_${Date.now()}_${i}`] = { ...item, done: false, createdAt: Date.now() };
        });
        set(ref(db, `wishlist/${tab}`), initial);
        initialized[tab] = true;
      } else {
        initialized[tab] = true;
        data[tab] = val ? Object.entries(val).map(([id, item]) => ({ id, ...item })) : [];
        data[tab].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        if (tab === currentTab) render();
      }
    });
  }

  listenTab('madu');
  listenTab('gugs');

  // ─── Actions ───
  window.toggleItem = function(id) {
    const item = data[currentTab].find(i => i.id === id);
    if (!item) return;
    update(ref(db, `wishlist/${currentTab}/${id}`), { done: !item.done });
    showPulse();
  };

  window.deleteItem = function(id) {
    const item = data[currentTab].find(i => i.id === id);
    if (!item) return;
    if (!confirm(`Remover "${item.name}"?`)) return;
    remove(ref(db, `wishlist/${currentTab}/${id}`));
  };

  window.addItem = function() {
    const nameInput = document.getElementById('new-name');
    const priceInput = document.getElementById('new-price');
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    const id = `item_${Date.now()}`;
    set(ref(db, `wishlist/${currentTab}/${id}`), {
      name,
      price: priceInput.value.trim(),
      note: '',
      done: false,
      createdAt: Date.now()
    });
    nameInput.value = '';
    priceInput.value = '';
    nameInput.focus();
    document.getElementById('add-panel').classList.add('hidden');
  };

  window.switchTab = function(tab) {
    currentTab = tab;
    currentFilter = 'all';
    document.getElementById('tab-madu').className = 'tab-btn' + (tab === 'madu' ? ' active-madu' : '');
    document.getElementById('tab-gugs').className = 'tab-btn' + (tab === 'gugs' ? ' active-gugs' : '');
    document.getElementById('add-panel').classList.add('hidden');
    setFilter('all', false);
    render();
  };

  window.setFilter = function(f, doRender = true) {
    currentFilter = f;
    ['all','pending','done'].forEach(x => {
      const b = document.getElementById('f-' + x);
      b.className = 'filter-btn filter-' + currentTab + (x === f ? ' active' : '');
    });
    if (doRender) render();
  };

  window.toggleAddPanel = function() {
    const p = document.getElementById('add-panel');
    p.classList.toggle('hidden');
    if (!p.classList.contains('hidden')) document.getElementById('new-name').focus();
  };

  function showPulse() {
    const sync = document.getElementById('sync-dot');
    sync.classList.add('pulse');
    setTimeout(() => sync.classList.remove('pulse'), 800);
  }

  // ─── Render ───
  function render() {
    const items = data[currentTab] || [];
    const total = items.length;
    const done = items.filter(i => i.done).length;

    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-total').textContent = total;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-fill').className = 'progress-fill fill-' + currentTab;
    document.getElementById('pct-label').textContent = pct + '%';

    const addBtn = document.getElementById('fab');
    addBtn.className = 'fab fab-' + currentTab;

    let filtered = items;
    if (currentFilter === 'pending') filtered = items.filter(i => !i.done);
    if (currentFilter === 'done') filtered = items.filter(i => i.done);

    const list = document.getElementById('wish-list');
    const emptyEl = document.getElementById('empty-state');

    if (filtered.length === 0) {
      list.innerHTML = '';
      emptyEl.classList.remove('hidden');
      return;
    }
    emptyEl.classList.add('hidden');

    list.innerHTML = filtered.map(item => {
      const checkClass = item.done ? `checked-${currentTab}` : '';
      const itemClass = item.done ? 'wish-item done' : 'wish-item';
      const priceTag = item.price ? `<span class="item-price price-${currentTab}">${item.price}</span>` : '';
      const noteTag = item.note ? `<div class="item-note">${item.note}</div>` : '';
      return `
        <li class="${itemClass}" id="li-${item.id}">
          <div class="wish-check ${checkClass}" onclick="toggleItem('${item.id}')">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="item-body">
            <div class="item-name">${item.name}</div>
            <div class="item-meta">${priceTag}${noteTag}</div>
          </div>
          <button class="del-btn" onclick="deleteItem('${item.id}')">✕</button>
        </li>`;
    }).join('');
  }

  // Initial render
  window.addEventListener('DOMContentLoaded', () => render());
</script>

<style>
  :root {
    --rose: #e8a0a0;
    --rose-dark: #c97070;
    --blue: #7aa8c7;
    --blue-dark: #4a7da0;
    --bg: #fdf8f5;
    --card: #fff;
    --text: #2d2020;
    --muted: #9a8080;
    --border: #ede0d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #f7e8e8 0%, #e8f0f7 100%);
    padding: 32px 20px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .hero-top { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 4px; }
  .sync-indicator { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); position: absolute; top: 14px; right: 16px; }
  #sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #6dba8a; transition: transform 0.2s; }
  #sync-dot.pulse { transform: scale(1.8); background: #4da86a; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px, 7vw, 40px); color: var(--text); }
  .hero h1 span { color: var(--rose-dark); font-style: italic; }
  .hero p { margin-top: 4px; color: var(--muted); font-size: 13px; }

  /* TABS */
  .tabs { display: flex; max-width: 500px; margin: 20px auto 0; background: white; border-radius: 14px; padding: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.25s; color: var(--muted); }
  .tab-btn.active-madu { background: linear-gradient(135deg, #e8a0a0, #c97070); color: white; box-shadow: 0 3px 10px rgba(201,112,112,0.3); }
  .tab-btn.active-gugs { background: linear-gradient(135deg, #7aa8c7, #4a7da0); color: white; box-shadow: 0 3px 10px rgba(74,125,160,0.3); }

  /* CONTENT */
  .content { max-width: 560px; margin: 0 auto; padding: 20px 16px; }

  /* STATS */
  .stats { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px 16px; background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .stats-left { flex: 1; }
  .stats-text { font-size: 13px; color: var(--muted); }
  .stats-text strong { color: var(--text); font-weight: 500; }
  .progress-wrap { display: flex; align-items: center; gap: 8px; flex: 2; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
  .fill-madu { background: linear-gradient(90deg, var(--rose), var(--rose-dark)); }
  .fill-gugs { background: linear-gradient(90deg, var(--blue), var(--blue-dark)); }
  #pct-label { font-size: 12px; color: var(--muted); min-width: 30px; text-align: right; }

  /* FILTER */
  .filter-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .filter-btn { padding: 6px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; color: var(--muted); transition: all 0.2s; }
  .filter-btn.active { border-color: transparent; color: white; }
  .filter-madu.active { background: var(--rose-dark); }
  .filter-gugs.active { background: var(--blue-dark); }

  /* ADD PANEL */
  .add-panel { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; animation: slideDown 0.2s ease; }
  .add-panel.hidden { display: none; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .add-panel h3 { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .add-row:last-child { margin-bottom: 0; }
  .add-input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border 0.2s; }
  .add-input:focus { border-color: var(--rose-dark); }
  .add-confirm { padding: 10px 20px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; background: linear-gradient(135deg, var(--rose), var(--rose-dark)); color: white; transition: opacity 0.2s, transform 0.15s; }
  .add-confirm.gugs-btn { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); }
  .add-confirm:active { transform: scale(0.95); }

  /* LIST */
  .wish-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .wish-item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px; background: var(--card); border-radius: 12px; border: 1.5px solid var(--border); transition: all 0.2s; animation: slideIn 0.25s ease; }
  .wish-item:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.07); transform: translateY(-1px); }
  .wish-item.done { background: #f9f2f2; opacity: 0.65; }
  .wish-item.done .item-name { text-decoration: line-through; color: var(--muted); }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  .wish-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: transparent; }
  .wish-check.checked-madu { background: var(--rose-dark); border-color: var(--rose-dark); }
  .wish-check.checked-gugs { background: var(--blue-dark); border-color: var(--blue-dark); }
  .wish-check svg { opacity: 0; transition: opacity 0.15s; }
  .wish-check.checked-madu svg, .wish-check.checked-gugs svg { opacity: 1; }

  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; line-height: 1.4; }
  .item-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .item-price { display: inline-block; font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .price-madu { background: #fae8e8; color: var(--rose-dark); }
  .price-gugs { background: #e4eef5; color: var(--blue-dark); }
  .item-note { font-size: 12px; color: var(--muted); font-style: italic; padding-top: 1px; }

  .del-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: #ddd; padding: 3px 6px; border-radius: 6px; transition: color 0.2s, background 0.2s; flex-shrink: 0; }
  .del-btn:hover { color: var(--rose-dark); background: #fae8e8; }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; width: 54px; height: 54px; border-radius: 50%; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 18px rgba(0,0,0,0.18); transition: transform 0.15s, box-shadow 0.15s; z-index: 100; display: flex; align-items: center; justify-content: center; }
  .fab:active { transform: scale(0.9); }
  .fab-madu { background: linear-gradient(135deg, var(--rose), var(--rose-dark)); color: white; }
  .fab-gugs { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty .emoji { font-size: 36px; display: block; margin-bottom: 10px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="hero">
  <div class="sync-indicator">
    <div id="sync-dot"></div> ao vivo
  </div>
  <h1>Lista de <span>Desejos</span> ♡</h1>
  <p>Madu & Gugs · 2026</p>
  <div class="tabs">
    <button class="tab-btn active-madu" id="tab-madu" onclick="switchTab('madu')">🌸 Madu</button>
    <button class="tab-btn" id="tab-gugs" onclick="switchTab('gugs')">⚡ Gugs</button>
  </div>
</div>

<div class="content">
  <div class="stats">
    <div class="stats-left">
      <div class="stats-text"><strong id="stat-done">0</strong> de <strong id="stat-total">0</strong> realizados</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill fill-madu" id="progress-fill" style="width:0%"></div>
      </div>
      <span id="pct-label">0%</span>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn filter-madu active" id="f-all" onclick="setFilter('all')">Todos</button>
    <button class="filter-btn filter-madu" id="f-pending" onclick="setFilter('pending')">Pendentes</button>
    <button class="filter-btn filter-madu" id="f-done" onclick="setFilter('done')">✓ Realizados</button>
  </div>

  <div class="add-panel hidden" id="add-panel">
    <h3>Novo desejo</h3>
    <div class="add-row">
      <input class="add-input" id="new-name" placeholder="Nome do item..." onkeydown="if(event.key==='Enter')addItem()">
    </div>
    <div class="add-row">
      <input class="add-input" id="new-price" placeholder="Valor (ex: R$ 200) — opcional" onkeydown="if(event.key==='Enter')addItem()">
      <button class="add-confirm" id="add-confirm" onclick="addItem()">Adicionar</button>
    </div>
  </div>

  <ul class="wish-list" id="wish-list"></ul>
  <div class="empty hidden" id="empty-state">
    <span class="emoji">🌟</span>
    Nenhum item aqui!
  </div>
</div>

<button class="fab fab-madu" id="fab" onclick="toggleAddPanel()" title="Adicionar desejo">+</button>

</body>
</html>
