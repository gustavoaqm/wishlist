      // Formata preço: "100~300" → "R$ 100 ~ R$ 300", "350" → "R$ 350"
      function formatPrice(raw) {
        if (!raw || raw.trim() === "") return "";
        const val = raw.trim();
        const rangeMatch = val.match(/^([\d.,]+)\s*[~\-]\s*([\d.,]+)$/);
        if (rangeMatch) return `R$ ${rangeMatch[1]} ~ R$ ${rangeMatch[2]}`;
        if (/^[\d.,]+$/.test(val)) return `R$ ${val}`;
        if (val.toLowerCase().startsWith("r$")) return val;
        return val;
      }

      function normalizePrice(raw) {
        if (!raw) return "";
        return raw
          .trim()
          .replace(/^R\$\s*/i, "")
          .trim();
      }

      // Firebase
      function listenTab(tab) {
        onValue(ref(db, `wishlist/${tab}`), (snapshot) => {
          const val = snapshot.val();
          if (val === null && !initialized[tab]) {
            const initial = {};
            INITIAL_DATA[tab].forEach((item, i) => {
              initial[`item_${Date.now()}_${i}`] = {
                ...item,
                done: false,
                createdAt: Date.now() + i,
              };
            });
            set(ref(db, `wishlist/${tab}`), initial);
            initialized[tab] = true;
          } else {
            initialized[tab] = true;
            data[tab] = val
              ? Object.entries(val).map(([id, item]) => ({ id, ...item }))
              : [];
            data[tab].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
            if (tab === currentTab) render();
          }
        });
      }

      listenTab("madu");
      listenTab("gugs");

      window.toggleItem = function (id) {
        const item = data[currentTab].find((i) => i.id === id);
        if (!item) return;
        update(ref(db, `wishlist/${currentTab}/${id}`), { done: !item.done });
        showPulse();
      };

      window.deleteItem = function (id) {
        const item = data[currentTab].find((i) => i.id === id);
        if (!item) return;
        if (!confirm(`Remover "${item.name}"?`)) return;
        remove(ref(db, `wishlist/${currentTab}/${id}`));
        closeModal();
      };

      window.addItem = function () {
        const nameEl = document.getElementById("new-name");
        const name = nameEl.value.trim();
        if (!name) {
          nameEl.focus();
          return;
        }
        const id = `item_${Date.now()}`;
        set(ref(db, `wishlist/${currentTab}/${id}`), {
          name,
          price: normalizePrice(document.getElementById("new-price").value),
          note: "",
          desc: document.getElementById("new-desc").value.trim(),
          links: document.getElementById("new-links").value.trim(),
          done: false,
          createdAt: Date.now(),
        });
        ["new-name", "new-price", "new-desc", "new-links"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
        document.getElementById("add-price-preview").textContent = "";
        nameEl.focus();
        document.getElementById("add-panel").classList.add("hidden");
      };

      // Edit modal
      let editingId = null;

      window.openEdit = function (id) {
        const item = data[currentTab].find((i) => i.id === id);
        if (!item) return;
        editingId = id;
        document.getElementById("edit-name").value = item.name || "";
        document.getElementById("edit-price").value = item.price || "";
        document.getElementById("edit-note").value = item.note || "";
        document.getElementById("edit-desc").value = item.desc || "";
        document.getElementById("edit-links").value = item.links || "";
        document.getElementById("edit-price-preview").textContent = "";
        const btn = document.getElementById("save-edit-btn");
        if (btn)
          btn.style.background =
            currentTab === "madu"
              ? "linear-gradient(135deg,#e8a0a0,#c97070)"
              : "linear-gradient(135deg,#7aa8c7,#4a7da0)";
        const modal = document.getElementById("edit-modal");
        modal.classList.remove("hidden");
        setTimeout(
          () => modal.querySelector(".modal-box").classList.add("in"),
          10,
        );
        document.getElementById("edit-name").focus();
      };

      // Autosave: persists current modal fields without closing
      function persistEdit() {
        if (!editingId) return;
        const name = document.getElementById("edit-name").value.trim();
        if (!name) return; // silently skip if name empty
        update(ref(db, `wishlist/${currentTab}/${editingId}`), {
          name,
          price: normalizePrice(document.getElementById("edit-price").value),
          note: document.getElementById("edit-note").value.trim(),
          desc: document.getElementById("edit-desc").value.trim(),
          links: document.getElementById("edit-links").value.trim(),
        });
        showPulse();
        // Show autosave badge briefly
        const badge = document.getElementById("autosave-badge");
        if (badge) {
          badge.classList.add("show");
          setTimeout(() => badge.classList.remove("show"), 1800);
        }
      }

      // Debounced autosave while typing
      let autosaveTimer = null;
      window.scheduleAutosave = function () {
        clearTimeout(autosaveTimer);
        autosaveTimer = setTimeout(persistEdit, 900);
      };

      window.saveEdit = function () {
        clearTimeout(autosaveTimer);
        persistEdit();
        closeModal();
      };

      window.deleteFromModal = function () {
        if (editingId) deleteItem(editingId);
      };

      window.closeModal = function () {
        // Autosave on close (covers ✕ button, backdrop tap, swipe-down)
        clearTimeout(autosaveTimer);
        persistEdit();
        // Dismiss keyboard on mobile
        document.activeElement && document.activeElement.blur();
        const modal = document.getElementById("edit-modal");
        modal.querySelector(".modal-box").classList.remove("in");
        setTimeout(() => modal.classList.add("hidden"), 220);
        editingId = null;
      };

      window.switchTab = function (tab) {
        currentTab = tab;
        currentFilter = "all";
        document.getElementById("tab-madu").className =
          "tab-btn" + (tab === "madu" ? " active-madu" : "");
        document.getElementById("tab-gugs").className =
          "tab-btn" + (tab === "gugs" ? " active-gugs" : "");
        document.getElementById("add-panel").classList.add("hidden");
        setFilter("all", false);
        render();
      };

      window.setFilter = function (f, doRender = true) {
        currentFilter = f;
        ["all", "pending", "done"].forEach((x) => {
          document.getElementById("f-" + x).className =
            "filter-btn filter-" + currentTab + (x === f ? " active" : "");
        });
        if (doRender) render();
      };

      window.toggleAddPanel = function () {
        const p = document.getElementById("add-panel");
        p.classList.toggle("hidden");
        if (!p.classList.contains("hidden")) {
          document.getElementById("add-confirm").className =
            "add-confirm" + (currentTab === "gugs" ? " gugs-btn" : "");
          document.getElementById("new-name").focus();
        }
      };

      window.previewPrice = function (inputId, previewId) {
        const val = document.getElementById(inputId).value;
        const formatted = formatPrice(normalizePrice(val));
        document.getElementById(previewId).textContent = formatted
          ? `→ ${formatted}`
          : "";
      };

      function showPulse() {
        const dot = document.getElementById("sync-dot");
        dot.classList.add("pulse");
        setTimeout(() => dot.classList.remove("pulse"), 800);
      }

      function render() {
        const items = data[currentTab] || [];
        const total = items.length;
        const done = items.filter((i) => i.done).length;
        document.getElementById("stat-done").textContent = done;
        document.getElementById("stat-total").textContent = total;
        const pct = total ? Math.round((done / total) * 100) : 0;
        document.getElementById("progress-fill").style.width = pct + "%";
        document.getElementById("progress-fill").className =
          "progress-fill fill-" + currentTab;
        document.getElementById("pct-label").textContent = pct + "%";
        document.getElementById("fab").className = "fab fab-" + currentTab;

        let filtered =
          currentFilter === "pending"
            ? items.filter((i) => !i.done)
            : currentFilter === "done"
              ? items.filter((i) => i.done)
              : items;

        const list = document.getElementById("wish-list");
        const emptyEl = document.getElementById("empty-state");

        if (filtered.length === 0) {
          list.innerHTML = "";
          emptyEl.classList.remove("hidden");
          return;
        }
        emptyEl.classList.add("hidden");

        list.innerHTML = filtered
          .map((item) => {
            const checkClass = item.done ? `checked-${currentTab}` : "";
            const priceFormatted = formatPrice(item.price || "");
            const priceTag = priceFormatted
              ? `<span class="item-price price-${currentTab}">${priceFormatted}</span>`
              : "";
            const noteTag = item.note
              ? `<span class="item-note">${item.note}</span>`
              : "";
            const descTag = item.desc
              ? `<div class="item-desc">${item.desc}</div>`
              : "";
            let linksHtml = "";
            if (item.links) {
              const linkList = item.links
                .split(/[\n,]+/)
                .map((l) => l.trim())
                .filter(Boolean);
              linksHtml = `<div class="item-links">${linkList
                .map((l, i) => {
                  const href = l.startsWith("http") ? l : "https://" + l;
                  return `<a href="${href}" target="_blank" rel="noopener" class="item-link link-${currentTab}">🔗 Link${linkList.length > 1 ? " " + (i + 1) : ""}</a>`;
                })
                .join("")}</div>`;
            }
            return `<li class="wish-item${item.done ? " done" : ""}" id="li-${item.id}">
        <div class="wish-check ${checkClass}" onclick="toggleItem('${item.id}')">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="item-body" onclick="openEdit('${item.id}')">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${priceTag}${noteTag}</div>
          ${descTag}${linksHtml}
        </div>
        <button class="edit-btn" onclick="openEdit('${item.id}')" title="Editar">✏️</button>
      </li>`;
          })
          .join("");
      }

      window.addEventListener("DOMContentLoaded", render);

      // Close modal on backdrop click (also dismisses keyboard)
      window.addEventListener("click", (e) => {
        if (e.target.id === "edit-modal") closeModal();
      });

      // Dismiss keyboard when tapping outside any input (but not on inputs themselves)
      document.addEventListener(
        "touchstart",
        (e) => {
          const tag = e.target.tagName;
          const isInput =
            tag === "INPUT" || tag === "TEXTAREA" || tag === "BUTTON";
          if (
            !isInput &&
            document.activeElement &&
            (document.activeElement.tagName === "INPUT" ||
              document.activeElement.tagName === "TEXTAREA")
          ) {
            document.activeElement.blur();
          }
        },
        { passive: true },
      );

      // Keyboard shortcuts
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (
          e.key === "Enter" &&
          !document.getElementById("edit-modal").classList.contains("hidden") &&
          document.activeElement.tagName !== "TEXTAREA"
        ) {
          saveEdit();
        }
      });

      // Swipe down to close modal on mobile
      let touchStartY = 0;
      document.addEventListener(
        "touchstart",
        (e) => {
          const box = document.querySelector(".modal-box");
          if (box && box.contains(e.target)) touchStartY = e.touches[0].clientY;
        },
        { passive: true },
      );
      document.addEventListener(
        "touchend",
        (e) => {
          const box = document.querySelector(".modal-box");
          if (!box || !box.classList.contains("in")) return;
          const delta = e.changedTouches[0].clientY - touchStartY;
          if (delta > 80) closeModal(); // swipe down 80px closes
        },
        { passive: true },
      );
    </script>

    <style>
      :root {
        --rose: #e8a0a0;
        --rose-dark: #c97070;
        --blue: #7aa8c7;
        --blue-dark: #4a7da0;
        --bg: #fdf8f5;
        --card: #fff;
        --text: #2d2020;
        --muted: #9a8080;
        --border: #ede0d4;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding-bottom: 100px;
      }

      /* HERO */
      .hero {
        background: linear-gradient(135deg, #f7e8e8 0%, #e8f0f7 100%);
        padding: 32px 20px 24px;
        text-align: center;
        border-bottom: 1px solid var(--border);
        position: relative;
      }
      .sync-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--muted);
        position: absolute;
        top: 14px;
        right: 16px;
      }
      #sync-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #6dba8a;
      }
      #sync-dot.pulse {
        transform: scale(1.8);
        background: #4da86a;
        transition: transform 0.2s;
      }
      .hero h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(26px, 7vw, 40px);
      }
      .hero h1 span {
        color: var(--rose-dark);
        font-style: italic;
      }
      .hero p {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      /* TABS */
      .tabs {
        display: flex;
        max-width: 500px;
        margin: 20px auto 0;
        background: white;
        border-radius: 14px;
        padding: 4px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      }
      .tab-btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: transparent;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s;
        color: var(--muted);
      }
      .tab-btn.active-madu {
        background: linear-gradient(135deg, #e8a0a0, #c97070);
        color: white;
        box-shadow: 0 3px 10px rgba(201, 112, 112, 0.3);
      }
      .tab-btn.active-gugs {
        background: linear-gradient(135deg, #7aa8c7, #4a7da0);
        color: white;
        box-shadow: 0 3px 10px rgba(74, 125, 160, 0.3);
      }

      /* CONTENT */
      .content {
        max-width: 560px;
        margin: 0 auto;
        padding: 20px 16px;
      }

      /* STATS */
      .stats {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding: 12px 16px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
      }
      .stats-left {
        flex: 1;
      }
      .stats-text {
        font-size: 13px;
        color: var(--muted);
      }
      .stats-text strong {
        color: var(--text);
        font-weight: 500;
      }
      .progress-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 2;
      }
      .progress-bar {
        flex: 1;
        height: 6px;
        background: var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 10px;
        transition: width 0.5s ease;
      }
      .fill-madu {
        background: linear-gradient(90deg, var(--rose), var(--rose-dark));
      }
      .fill-gugs {
        background: linear-gradient(90deg, var(--blue), var(--blue-dark));
      }
      #pct-label {
        font-size: 12px;
        color: var(--muted);
        min-width: 30px;
        text-align: right;
      }

      /* FILTER */
      .filter-row {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
      }
      .filter-btn {
        padding: 6px 12px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: white;
        font-size: 12px;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        color: var(--muted);
        transition: all 0.2s;
      }
      .filter-btn.active {
        border-color: transparent;
        color: white;
      }
      .filter-madu.active {
        background: var(--rose-dark);
      }
      .filter-gugs.active {
        background: var(--blue-dark);
      }

      /* ADD PANEL */
      .add-panel {
        background: white;
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        animation: slideDown 0.2s ease;
      }
      .add-panel.hidden {
        display: none;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .add-panel h3 {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .add-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      .add-row:last-child {
        margin-bottom: 0;
      }
      .add-input {
        flex: 1;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 16px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border 0.2s;
        resize: vertical;
        -webkit-text-size-adjust: 100%;
      }
      .add-input:focus {
        border-color: var(--rose-dark);
      }
      .price-preview {
        font-size: 11px;
        color: var(--muted);
        margin: -4px 0 6px 2px;
        min-height: 16px;
        font-style: italic;
      }
      .add-confirm {
        padding: 10px 18px;
        border: none;
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        background: linear-gradient(135deg, var(--rose), var(--rose-dark));
        color: white;
        transition: transform 0.15s;
        white-space: nowrap;
      }
      .add-confirm.gugs-btn {
        background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      }
      .add-confirm:active {
        transform: scale(0.95);
      }

      /* LIST */
      .wish-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .wish-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 13px 14px;
        background: var(--card);
        border-radius: 12px;
        border: 1.5px solid var(--border);
        transition: all 0.2s;
        animation: slideIn 0.25s ease;
      }
      .wish-item:hover {
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
        transform: translateY(-1px);
      }
      .wish-item.done {
        background: #f9f2f2;
        opacity: 0.65;
      }
      .wish-item.done .item-name {
        text-decoration: line-through;
        color: var(--muted);
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .wish-check {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--border);
        cursor: pointer;
        flex-shrink: 0;
        margin-top: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        background: transparent;
      }
      .wish-check.checked-madu {
        background: var(--rose-dark);
        border-color: var(--rose-dark);
      }
      .wish-check.checked-gugs {
        background: var(--blue-dark);
        border-color: var(--blue-dark);
      }
      .wish-check svg {
        opacity: 0;
        transition: opacity 0.15s;
      }
      .wish-check.checked-madu svg,
      .wish-check.checked-gugs svg {
        opacity: 1;
      }

      .item-body {
        flex: 1;
        min-width: 0;
        cursor: pointer;
      }
      .item-name {
        font-size: 14px;
        line-height: 1.4;
      }
      .item-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 4px;
        align-items: center;
      }
      .item-price {
        font-size: 12px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 20px;
      }
      .price-madu {
        background: #fae8e8;
        color: var(--rose-dark);
      }
      .price-gugs {
        background: #e4eef5;
        color: var(--blue-dark);
      }
      .item-note {
        font-size: 12px;
        color: var(--muted);
        font-style: italic;
      }
      .item-desc {
        font-size: 12px;
        color: #6a5c5c;
        margin-top: 5px;
        line-height: 1.5;
      }
      .item-links {
        margin-top: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .item-link {
        font-size: 11px;
        font-weight: 500;
        padding: 3px 10px;
        border-radius: 20px;
        text-decoration: none;
      }
      .item-link:hover {
        opacity: 0.75;
      }
      .link-madu {
        background: #fae8e8;
        color: var(--rose-dark);
      }
      .link-gugs {
        background: #e4eef5;
        color: var(--blue-dark);
      }

      .edit-btn {
        background: none;
        border: none;
        font-size: 15px;
        cursor: pointer;
        color: #ccc;
        padding: 3px 6px;
        border-radius: 6px;
        transition: opacity 0.2s;
        flex-shrink: 0;
        opacity: 0;
      }
      .wish-item:hover .edit-btn {
        opacity: 1;
      }

      /* FAB */
      .fab {
        position: fixed;
        bottom: 24px;
        right: 20px;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: none;
        font-size: 26px;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
        transition: transform 0.15s;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .fab:active {
        transform: scale(0.9);
      }
      .fab-madu {
        background: linear-gradient(135deg, var(--rose), var(--rose-dark));
        color: white;
      }
      .fab-gugs {
        background: linear-gradient(135deg, var(--blue), var(--blue-dark));
        color: white;
      }

      /* EMPTY */
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
        font-size: 14px;
      }
      .empty .emoji {
        font-size: 36px;
        display: block;
        margin-bottom: 10px;
      }

      /* MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(30, 10, 10, 0.4);
        backdrop-filter: blur(4px);
        z-index: 200;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      @media (min-width: 500px) {
        .modal-overlay {
          align-items: center;
          padding: 20px;
        }
      }
      .modal-box {
        background: var(--card);
        border-radius: 20px 20px 0 0;
        width: 100%;
        max-width: 520px;
        padding: 8px 20px 36px;
        transform: translateY(40px);
        opacity: 0;
        transition:
          transform 0.22s ease,
          opacity 0.22s ease;
        max-height: 92vh;
        overflow-y: auto;
      }
      @media (min-width: 500px) {
        .modal-box {
          border-radius: 20px;
          padding-top: 24px;
        }
      }
      .modal-box.in {
        transform: translateY(0);
        opacity: 1;
      }

      /* drag handle (mobile only) */
      .drag-handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 4px;
        margin: 8px auto 16px;
      }
      @media (min-width: 500px) {
        .drag-handle {
          display: none;
        }
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .modal-title {
        font-family: "Playfair Display", serif;
        font-size: 18px;
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: var(--muted);
        padding: 4px 8px;
        border-radius: 8px;
      }
      .modal-close:hover {
        background: var(--border);
      }
      .modal-field {
        margin-bottom: 12px;
      }
      .modal-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-bottom: 5px;
      }
      .modal-input {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 16px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border 0.2s;
        resize: vertical;
        -webkit-text-size-adjust: 100%;
      }
      .modal-input:focus {
        border-color: var(--rose-dark);
      }
      .modal-price-preview {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
        min-height: 14px;
        font-style: italic;
      }

      /* autosave indicator */
      .autosave-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: #6dba8a;
        opacity: 0;
        transition: opacity 0.3s;
        margin-left: 8px;
      }
      .autosave-badge.show {
        opacity: 1;
      }

      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
      }
      .close-btn {
        flex: 1;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        color: white;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .close-btn:active {
        transform: scale(0.97);
      }
      .del-modal-btn {
        padding: 14px 16px;
        border: 1.5px solid #fae8e8;
        border-radius: 12px;
        background: white;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        cursor: pointer;
        color: var(--rose-dark);
      }
      .del-modal-btn:hover {
        background: #fae8e8;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="sync-indicator">
        <div id="sync-dot"></div>
        ao vivo
      </div>
      <h1>Lista de <span>Desejos</span> ♡</h1>
      <p>Madu &amp; Gugs · 2026</p>
      <div class="tabs">
        <button
          class="tab-btn active-madu"
          id="tab-madu"
          onclick="switchTab('madu')"
        >
          🌸 Madu
        </button>
        <button class="tab-btn" id="tab-gugs" onclick="switchTab('gugs')">
          ⚡ Gugs
        </button>
      </div>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stats-left">
          <div class="stats-text">
            <strong id="stat-done">0</strong> de
            <strong id="stat-total">0</strong> realizados
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div
              class="progress-fill fill-madu"
              id="progress-fill"
              style="width: 0%"
            ></div>
          </div>
          <span id="pct-label">0%</span>
        </div>
      </div>

      <div class="filter-row">
        <button
          class="filter-btn filter-madu active"
          id="f-all"
          onclick="setFilter('all')"
        >
          Todos
        </button>
        <button
          class="filter-btn filter-madu"
          id="f-pending"
          onclick="setFilter('pending')"
        >
          Pendentes
        </button>
        <button
          class="filter-btn filter-madu"
          id="f-done"
          onclick="setFilter('done')"
        >
          ✓ Realizados
        </button>
      </div>

      <div class="add-panel hidden" id="add-panel">
        <h3>✨ Novo desejo</h3>
        <div class="add-row">
          <input
            class="add-input"
            id="new-name"
            placeholder="Nome do item *"
            onkeydown="
              if (event.key === 'Enter')
                document.getElementById('new-price').focus();
            "
          />
        </div>
        <div class="add-row">
          <input
            class="add-input"
            id="new-price"
            placeholder="Preço — ex: 200 ou 100~400 (opcional)"
            oninput="previewPrice('new-price', 'add-price-preview')"
          />
        </div>
        <div class="price-preview" id="add-price-preview"></div>
        <div class="add-row">
          <textarea
            class="add-input"
            id="new-desc"
            rows="2"
            placeholder="Descrição — cor, tamanho, modelo... (opcional)"
          ></textarea>
        </div>
        <div class="add-row">
          <input
            class="add-input"
            id="new-links"
            placeholder="Links de referência — separados por vírgula (opcional)"
            onkeydown="if (event.key === 'Enter') addItem();"
          />
          <button class="add-confirm" id="add-confirm" onclick="addItem()">
            Adicionar
          </button>
        </div>
      </div>

      <ul class="wish-list" id="wish-list"></ul>
      <div class="empty hidden" id="empty-state">
        <span class="emoji">🌟</span>Nenhum item aqui!
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay hidden" id="edit-modal">
      <div class="modal-box">
        <div class="drag-handle"></div>
        <div class="modal-header">
          <span class="modal-title"
            >Editar desejo ✏️
            <span class="autosave-badge" id="autosave-badge"
              >✓ salvo</span
            ></span
          >
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-field">
          <div class="modal-label">Nome *</div>
          <input
            class="modal-input"
            id="edit-name"
            placeholder="Nome do item"
            oninput="scheduleAutosave()"
          />
        </div>
        <div class="modal-field">
          <div class="modal-label">Preço</div>
          <input
            class="modal-input"
            id="edit-price"
            placeholder="Ex: 200 ou 100~400"
            oninput="
              previewPrice('edit-price', 'edit-price-preview');
              scheduleAutosave();
            "
          />
          <div class="modal-price-preview" id="edit-price-preview"></div>
        </div>
        <div class="modal-field">
          <div class="modal-label">Observação rápida</div>
          <input
            class="modal-input"
            id="edit-note"
            placeholder="Ex: escolha própria, tamanho M..."
            oninput="scheduleAutosave()"
          />
        </div>
        <div class="modal-field">
          <div class="modal-label">Descrição</div>
          <textarea
            class="modal-input"
            id="edit-desc"
            rows="3"
            placeholder="Detalhes, modelo, cor, tamanho..."
            oninput="scheduleAutosave()"
          ></textarea>
        </div>
        <div class="modal-field">
          <div class="modal-label">Links de referência</div>
          <textarea
            class="modal-input"
            id="edit-links"
            rows="2"
            placeholder="Cole links separados por vírgula ou por linha"
            oninput="scheduleAutosave()"
          ></textarea>
        </div>
        <div class="modal-actions">
          <button class="del-modal-btn" onclick="deleteFromModal()">
            🗑 Remover
          </button>
          <button class="close-btn" id="save-edit-btn" onclick="saveEdit()">
            Concluir
          </button>
        </div>
      </div>
    </div>

    <button
      class="fab fab-madu"
      id="fab"
      onclick="toggleAddPanel()"
      title="Adicionar desejo"
    >
      +
    </button>
  </body>
</html>
